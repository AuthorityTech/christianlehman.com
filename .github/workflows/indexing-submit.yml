name: Indexing Submit

on:
  push:
    branches: [main]
    paths:
      - "content/posts/**"
      - "src/content/posts/**"
      - "src/app/**/sitemap.ts"
      - "src/app/sitemap.xml/**"
      - "src/app/machine-sitemap.json/**"
      - ".github/workflows/indexing-submit.yml"
  workflow_dispatch:

concurrency:
  group: indexing-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit-indexing-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content manifest
        run: npm run content:manifest

      - name: Wait for production sitemap
        run: npm run indexing:wait

      - name: Submit all canonical URLs to IndexNow
        run: npm run indexnow:all

      - name: Submit sitemap to Google Search Console
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: sc-domain:christianlehman.com
          GSC_SITEMAP_URL: https://christianlehman.com/sitemap.xml
        run: |
          if [ -z "${GSC_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::warning::GSC_SERVICE_ACCOUNT_JSON is not configured; skipped Google Search Console sitemap submission."
            exit 0
          fi
          npm run indexing:google-sitemap
