name: Brain Sync — AST Graph

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: brain-sync-${{ vars.BRAIN_LANE }}
      cancel-in-progress: false

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphifyy
        run: pip install graphifyy

      - name: Run AST extraction pipeline
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from graphify.detect import detect
          from graphify.extract import collect_files, extract
          from graphify.build import build
          from graphify.cluster import cluster, score_all
          from graphify.export import to_json
          from graphify.report import generate

          # Step 1: Detect files
          root = Path('.')
          detection = detect(root)
          print(f'Detected: {detection[\"total_files\"]} files')

          code_files_raw = detection.get('files', {}).get('code', [])
          if not code_files_raw:
              print('No code files found — skipping.')
              raise SystemExit(0)

          # Step 2: AST extraction (code only, no LLM)
          code_files = []
          for f in code_files_raw:
              p = Path(f)
              code_files.extend(collect_files(p) if p.is_dir() else [p])

          ast_result = extract(code_files)
          print(f'AST: {len(ast_result[\"nodes\"])} nodes, {len(ast_result[\"edges\"])} edges')

          # Step 3: Build graph
          G = build([ast_result])
          print(f'Graph: {G.number_of_nodes()} nodes, {G.number_of_edges()} edges')

          # Step 4: Cluster
          communities = cluster(G)
          cohesion = score_all(G, communities)
          community_labels = {cid: f'Community {cid}' for cid in communities}
          print(f'Communities: {len(communities)}')

          # Step 5: Export graph.json
          out = Path('graphify-out')
          out.mkdir(exist_ok=True)
          to_json(G, communities, str(out / 'graph.json'))

          # Step 6: Generate report
          god_nodes = [{'label': n, 'edges': G.degree(n)} for n in sorted(G.nodes(), key=lambda x: G.degree(x), reverse=True)[:10]]
          report_md = generate(
              G=G,
              communities=communities,
              cohesion_scores=cohesion,
              community_labels=community_labels,
              god_node_list=god_nodes,
              surprise_list=[],
              detection_result=detection,
              token_cost={'input_tokens': 0, 'output_tokens': 0},
              root=str(root),
          )
          (out / 'GRAPH_REPORT.md').write_text(report_md)
          print('Pipeline complete.')
          "

      - name: Clone brain and sync lane
        env:
          BRAIN_PAT: ${{ secrets.BRAIN_PAT }}
          LANE: ${{ vars.BRAIN_LANE }}
        run: |
          set -euo pipefail

          # Clone brain repo
          git clone --depth=1 "https://x-access-token:${BRAIN_PAT}@github.com/AuthorityTech/brain.git" /tmp/brain

          # Ensure lane directory exists
          mkdir -p "/tmp/brain/${LANE}"

          # Copy AST outputs (graph + report only — wiki rebuilds weekly)
          cp -f graphify-out/graph.json "/tmp/brain/${LANE}/graph.json" 2>/dev/null || true
          cp -f graphify-out/GRAPH_REPORT.md "/tmp/brain/${LANE}/GRAPH_REPORT.md" 2>/dev/null || true

          # Check for actual changes
          cd /tmp/brain
          git diff --quiet && echo "No changes to brain — skipping." && exit 0

          # Configure git and push with retry
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${LANE}/graph.json" "${LANE}/GRAPH_REPORT.md"
          git commit -m "sync(${LANE}): AST graph update from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"

          # Retry push up to 3 times (handles concurrent lane pushes)
          for attempt in 1 2 3; do
            if git push; then
              echo "Brain updated successfully (attempt ${attempt})."
              exit 0
            fi
            echo "Push failed (attempt ${attempt}), rebasing and retrying..."
            git pull --rebase
          done

          echo "::error::Failed to push to brain after 3 attempts."
          exit 1
