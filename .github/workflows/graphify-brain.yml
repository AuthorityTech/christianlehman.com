name: Brain Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: brain-sync-${{ vars.BRAIN_LANE }}
      cancel-in-progress: false

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphifyy
        run: pip install graphifyy

      - name: Run graphify pipeline
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from graphify.detect import detect
          from graphify.extract import collect_files, extract
          from graphify.build import build
          from graphify.cluster import cluster, score_all
          from graphify.analyze import god_nodes, surprising_connections
          from graphify.export import to_json
          from graphify.report import generate
          from graphify.wiki import to_wiki

          root = Path('.')
          detection = detect(root)
          print(f'Detected: {detection[\"total_files\"]} files')

          code_files_raw = detection.get('files', {}).get('code', [])
          if not code_files_raw:
              print('No code files found — skipping.')
              raise SystemExit(0)

          # AST extraction
          code_files = []
          for f in code_files_raw:
              p = Path(f)
              code_files.extend(collect_files(p) if p.is_dir() else [p])

          ast_result = extract(code_files)
          print(f'AST: {len(ast_result[\"nodes\"])} nodes, {len(ast_result[\"edges\"])} edges')

          # Build + cluster
          G = build([ast_result])
          communities = cluster(G)
          cohesion = score_all(G, communities)
          labels = {cid: f'Community {cid}' for cid in communities}
          print(f'Graph: {G.number_of_nodes()} nodes, {G.number_of_edges()} edges, {len(communities)} communities')

          # Analyze
          gods = god_nodes(G)
          surprises = surprising_connections(G, communities)

          # Export graph.json
          out = Path('graphify-out')
          out.mkdir(exist_ok=True)
          to_json(G, communities, str(out / 'graph.json'))

          # Generate report
          report_md = generate(
              G=G, communities=communities, cohesion_scores=cohesion,
              community_labels=labels, god_node_list=gods,
              surprise_list=surprises, detection_result=detection,
              token_cost={'input_tokens': 0, 'output_tokens': 0},
              root=str(root),
          )
          (out / 'GRAPH_REPORT.md').write_text(report_md)

          # Generate wiki
          wiki_count = to_wiki(
              G, communities, str(out / 'wiki'),
              community_labels=labels, cohesion=cohesion,
              god_nodes_data=gods,
          )
          print(f'Wiki: {wiki_count} articles')
          print('Pipeline complete.')
          "

      - name: Clone brain and sync lane
        if: hashFiles('graphify-out/graph.json') != ''
        env:
          BRAIN_PAT: ${{ secrets.BRAIN_PAT }}
          LANE: ${{ vars.BRAIN_LANE }}
        run: |
          set -euo pipefail

          git clone --depth=1 "https://x-access-token:${BRAIN_PAT}@github.com/AuthorityTech/brain.git" /tmp/brain
          mkdir -p "/tmp/brain/${LANE}"

          # Merge AST output with existing semantic nodes (if any)
          # The server runs semantic extraction periodically. The Action only does AST.
          # Preserve semantic nodes/edges so they don't get wiped on every push.
          python3 -c "
          import json
          from pathlib import Path

          ast_graph = json.loads(Path('graphify-out/graph.json').read_text())
          brain_graph_path = Path('/tmp/brain/${LANE}/graph.json')

          if brain_graph_path.exists():
              brain_graph = json.loads(brain_graph_path.read_text())
              ast_ids = {n['id'] for n in ast_graph.get('nodes', [])}

              # Preserve semantic nodes from brain that aren't in the AST output
              semantic_types = {'document','concept','glossary','strategy','metric','entity','framework'}
              preserved_nodes = [n for n in brain_graph.get('nodes', [])
                                 if n['id'] not in ast_ids
                                 and n.get('file_type','') in semantic_types]

              # Preserve edges where both endpoints exist in the merged set
              if preserved_nodes:
                  ast_graph['nodes'].extend(preserved_nodes)
                  merged_ids = {n['id'] for n in ast_graph['nodes']}
                  semantic_edges = [e for e in brain_graph.get('links', [])
                                   if e.get('source','') not in ast_ids
                                   or e.get('target','') not in ast_ids]
                  valid_edges = [e for e in semantic_edges
                                if e.get('source','') in merged_ids
                                and e.get('target','') in merged_ids]
                  ast_graph.setdefault('links', []).extend(valid_edges)
                  print(f'Preserved {len(preserved_nodes)} semantic nodes, {len(valid_edges)} semantic edges')

          Path('graphify-out/graph.json').write_text(json.dumps(ast_graph, indent=2))
          "

          cp -f graphify-out/graph.json "/tmp/brain/${LANE}/graph.json"
          cp -f graphify-out/GRAPH_REPORT.md "/tmp/brain/${LANE}/GRAPH_REPORT.md"
          rm -rf "/tmp/brain/${LANE}/wiki"
          cp -r graphify-out/wiki "/tmp/brain/${LANE}/wiki"

          cd /tmp/brain
          git add "${LANE}/"
          git diff --cached --quiet && echo "No changes to brain — skipping." && exit 0

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync(${LANE}): graph + wiki update from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"

          for attempt in 1 2 3; do
            if git push; then
              echo "Brain updated successfully (attempt ${attempt})."
              exit 0
            fi
            echo "Push failed (attempt ${attempt}), rebasing and retrying..."
            git pull --rebase
          done

          echo "::error::Failed to push to brain after 3 attempts."
          exit 1
